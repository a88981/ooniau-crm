<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ooniau 暖暖｜綠界會員登記</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐈‍⬛</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#F5C800;--gold-dim:rgba(230,200,80,0.18);--gold-b:rgba(230,200,80,0.32);
  --purple:#9080C0;--pd:#2D2840;--pm:#4A4060;--ps:#B8A8D8;
  --tm:#8880A0;--th:#BEB8D0;
  --lv3:#3B6D11;--lv3bg:#EAF3DE;
  --lv4:#A07800;--lv4bg:#FFF8D6;
  --lv5:#7050A0;--lv5bg:#F0EBF8;
}
body{font-family:'Noto Sans TC',sans-serif;font-size:16px;color:var(--pd);background:#FFF9F0;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:600px;margin:0 auto}
.header{text-align:center;margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:0.5px solid var(--gold-b)}
.header-en{font-size:.65rem;letter-spacing:.35em;color:var(--th);text-transform:uppercase;margin-bottom:.5rem}
.header-name{font-family:'Noto Serif TC',serif;font-size:1.8rem;font-weight:300;color:var(--purple);letter-spacing:.1em;margin-bottom:.3rem}
.header-sub{font-size:.85rem;color:var(--tm);letter-spacing:.06em}
.card{background:#fff;border:0.5px solid var(--gold-b);border-radius:4px;padding:1.8rem;margin-bottom:1.2rem}
.sec-title{font-size:.6rem;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:1.2rem;display:flex;align-items:center;gap:.6rem}
.sec-title::after{content:'';flex:1;height:.5px;background:var(--gold-dim)}
.fl{font-size:.7rem;letter-spacing:.12em;color:var(--tm);margin-bottom:5px;display:block;text-transform:uppercase}
.fi{width:100%;padding:10px 14px;border:0.5px solid var(--gold-b);border-radius:2px;font-family:'Noto Sans TC',sans-serif;font-size:.9rem;color:var(--pd);background:#fff;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--purple)}
.fr{margin-bottom:1.1rem}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.req{color:#E24B4A;margin-left:3px}
.level-grid{display:grid;grid-template-columns:1fr;gap:10px}
.level-card{border:1px solid var(--gold-b);border-radius:4px;padding:1rem 1.2rem;cursor:pointer;transition:all .2s;position:relative}
.level-card:hover{border-color:var(--purple)}
.level-card.selected{border-color:var(--purple);background:#F8F5FF}
.level-card input[type=radio]{position:absolute;opacity:0;pointer-events:none}
.level-name{font-size:.95rem;font-weight:500;color:var(--pd);margin-bottom:3px}
.level-price{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--purple);font-weight:300}
.level-desc{font-size:.72rem;color:var(--tm);margin-top:4px;line-height:1.6}
.lv3 .level-name{color:var(--lv3)}.lv3.selected{background:#F5FBF0;border-color:var(--lv3)}
.lv4 .level-name{color:var(--lv4)}.lv4.selected{background:#FFFDF0;border-color:var(--lv4)}
.lv5 .level-name{color:var(--lv5)}.lv5.selected{background:#F8F5FF;border-color:var(--lv5)}
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.plan-card{border:1px solid var(--gold-b);border-radius:4px;padding:.9rem 1rem;cursor:pointer;transition:all .2s;text-align:center;position:relative}
.plan-card:hover{border-color:var(--purple)}
.plan-card.selected{border-color:var(--purple);background:#F8F5FF}
.plan-card input[type=radio]{position:absolute;opacity:0;pointer-events:none}
.plan-name{font-size:.88rem;font-weight:500;color:var(--pd)}
.plan-sub{font-size:.7rem;color:var(--tm);margin-top:3px}
.ship-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.ship-card{border:1px solid var(--gold-b);border-radius:4px;padding:.75rem;cursor:pointer;transition:all .2s;text-align:center;font-size:.8rem;color:var(--tm)}
.ship-card:hover{border-color:var(--purple);color:var(--pd)}
.ship-card.selected{border-color:var(--purple);background:#F8F5FF;color:var(--purple);font-weight:500}
.upload-area{border:1px dashed var(--gold-b);border-radius:4px;padding:2rem;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.upload-area:hover{border-color:var(--purple);background:#FDFBFF}
.upload-area.has-file{border-color:var(--purple);background:#F8F5FF}
.upload-icon{font-size:2rem;margin-bottom:.5rem}
.upload-text{font-size:.82rem;color:var(--tm)}
.upload-sub{font-size:.7rem;color:var(--th);margin-top:.3rem}
.upload-input{position:absolute;inset:0;opacity:0;cursor:pointer}
.preview-img{max-width:100%;max-height:200px;border-radius:4px;margin-top:.8rem;display:none}
.submit-btn{width:100%;padding:14px;font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:400;letter-spacing:.2em;color:var(--pd);background:linear-gradient(135deg,#FFF9E6,#FFFBF0);border:1px solid var(--gold);border-radius:40px;cursor:pointer;transition:all .2s;margin-top:.5rem}
.submit-btn:hover{background:#FFF3C0;border-color:#E6A800}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.success-box{display:none;text-align:center;padding:3rem 2rem}
.success-icon{font-size:3rem;margin-bottom:1rem}
.success-title{font-family:'Noto Serif TC',serif;font-size:1.3rem;font-weight:300;color:var(--purple);letter-spacing:.08em;margin-bottom:.8rem}
.success-sub{font-size:.85rem;color:var(--tm);line-height:1.8}
.error-msg{color:#A32D2D;font-size:.75rem;margin-top:.4rem;display:none}
.uploading{font-size:.75rem;color:var(--tm);margin-top:.5rem;display:none}
.notice{background:#FFF9E6;border:.5px solid var(--gold-b);border-left:3px solid var(--gold);border-radius:2px;padding:1rem 1.2rem;margin-bottom:1.2rem;font-size:.8rem;color:var(--tm);line-height:1.8}
.notice strong{color:var(--pd)}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-en">Ooniau Member Registration</div>
    <div class="header-name">暖暖綠界會員登記</div>
    <div class="header-sub">填寫完畢後等待暖暖審核，審核通過即成為正式會員</div>
  </div>

  <div id="form-wrap">
    <div class="notice">
      <strong>注意事項</strong><br>
      · 請確認已在綠界完成訂閱後再填寫此表單<br>
      · 截圖請上傳綠界訂閱確認畫面<br>
      · 審核時間約 1-3 個工作天
    </div>

    <!-- 基本資料 -->
    <div class="card">
      <div class="sec-title">基本資料</div>
      <div class="f2">
        <div class="fr"><label class="fl">姓名 <span class="req">*</span></label><input class="fi" id="f-name" placeholder="你的真實姓名"></div>
        <div class="fr"><label class="fl">YouTube 會員名稱 <span class="req">*</span></label><input class="fi" id="f-yt" placeholder="頻道顯示名稱"></div>
      </div>
      <div class="f2">
        <div class="fr"><label class="fl">電話</label><input class="fi" id="f-phone" placeholder="09xx-xxx-xxx"></div>
        <div class="fr"><label class="fl">Email</label><input class="fi" id="f-email" type="email" placeholder="your@email.com"></div>
      </div>
      <div class="fr"><label class="fl">生日</label><input class="fi" id="f-bday" type="date"></div>
    </div>

    <!-- 會員等級 -->
    <div class="card">
      <div class="sec-title">會員等級 <span class="req">*</span></div>
      <div class="level-grid">
        <label class="level-card lv3" onclick="selectLevel(this,'LV.3 里民暖暖包')">
          <input type="radio" name="level" value="LV.3 里民暖暖包">
          <div class="level-name">LV.3 里民暖暖包</div>
          <div class="level-price">$520 <span style="font-size:.7rem;font-family:'Noto Sans TC'">/ 月</span></div>
          <div class="level-desc">相印小卡或半小時占卜 · 每3個月獎勵</div>
        </label>
        <label class="level-card lv4" onclick="selectLevel(this,'LV.4 肌肉暖暖包')">
          <input type="radio" name="level" value="LV.4 肌肉暖暖包">
          <div class="level-name">LV.4 肌肉暖暖包</div>
          <div class="level-price">$1,450 <span style="font-size:.7rem;font-family:'Noto Sans TC'">/ 月</span></div>
          <div class="level-desc">實體拍立得 · 每3個月獎勵 · 每月專屬聊心室30分鐘</div>
        </label>
        <label class="level-card lv5" onclick="selectLevel(this,'LV.5 真蒸暖暖包')">
          <input type="radio" name="level" value="LV.5 真蒸暖暖包">
          <div class="level-name">LV.5 真蒸暖暖包</div>
          <div class="level-price">$3,000 <span style="font-size:.7rem;font-family:'Noto Sans TC'">/ 月</span></div>
          <div class="level-desc">親簽拍立得 · 每3個月獎勵 · 每月專屬聊心室1小時</div>
        </label>
      </div>
      <div class="error-msg" id="err-level">請選擇會員等級</div>
    </div>

    <!-- 方案 -->
    <div class="card">
      <div class="sec-title">訂閱方案 <span class="req">*</span></div>
      <div class="plan-grid">
        <label class="plan-card" onclick="selectPlan(this,'年繳')">
          <input type="radio" name="plan" value="年繳">
          <div class="plan-name">年繳</div>
          <div class="plan-sub">連續訂閱一年</div>
        </label>
        <label class="plan-card" onclick="selectPlan(this,'單月')">
          <input type="radio" name="plan" value="單月">
          <div class="plan-name">單月</div>
          <div class="plan-sub">訂閱單個月</div>
        </label>
      </div>
      <div id="reason-wrap" style="display:none">
        <div class="fr"><label class="fl">訂閱單月的原因 <span class="req">*</span></label><textarea class="fi" id="f-reason" rows="3" placeholder="請說明訂閱單月的原因…" style="resize:vertical"></textarea></div>
      </div>
      <div class="fr"><label class="fl">綠界訂閱日期 <span class="req">*</span></label><input class="fi" id="f-join" type="date"></div>
      <div class="error-msg" id="err-plan">請選擇訂閱方案</div>
    </div>

    <!-- 收件資訊 -->
    <div class="card">
      <div class="sec-title">收件資訊</div>
      <div class="ship-grid">
        <div class="ship-card" onclick="selectShip(this,'宅配')">🏠 宅配</div>
        <div class="ship-card" onclick="selectShip(this,'超商取貨')">🏪 超商取貨</div>
        <div class="ship-card selected" onclick="selectShip(this,'')">不需要</div>
      </div>
      <div id="ship-home" style="display:none">
        <div class="fr"><label class="fl">宅配地址 <span class="req">*</span></label><input class="fi" id="f-addr" placeholder="縣市 + 鄉鎮市區 + 路段門牌"></div>
      </div>
      <div id="ship-cvs" style="display:none">
        <div class="fr"><label class="fl">超商門市 <span class="req">*</span></label><input class="fi" id="f-cvs" placeholder="7-11 暖暖門市 / 全家 基隆暖暖店"></div>
      </div>
    </div>

    <!-- 截圖上傳 -->
    <div class="card">
      <div class="sec-title">訂閱截圖 <span class="req">*</span></div>
      <div class="upload-area" id="upload-area">
        <input type="file" class="upload-input" id="f-file" accept="image/*" onchange="handleFile(this)">
        <div class="upload-icon">📷</div>
        <div class="upload-text">點擊上傳截圖</div>
        <div class="upload-sub">請上傳綠界訂閱確認截圖（JPG / PNG）</div>
        <img class="preview-img" id="preview-img">
      </div>
      <div class="uploading" id="uploading-text">⏳ 上傳中…</div>
      <div class="error-msg" id="err-file">請上傳訂閱截圖</div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitForm()">送出申請 ✦</button>
  </div>

  <!-- 成功畫面 -->
  <div class="success-box" id="success-box">
    <div class="success-icon">🐈‍⬛</div>
    <div class="success-title">申請已送出！</div>
    <div class="success-sub">
      感謝你成為暖暖的綠界會員 ✦<br>
      暖暖將在 1-3 個工作天內審核你的申請<br>
      審核通過後你將正式成為會員
    </div>
  </div>
</div>

<script>
let selectedLevel = '';
let selectedPlan = '';
let selectedShip = '';
let screenshotUrl = '';

function selectLevel(el, val) {
  document.querySelectorAll('.level-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedLevel = val;
  document.getElementById('err-level').style.display = 'none';
}

function selectPlan(el, val) {
  document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedPlan = val;
  document.getElementById('reason-wrap').style.display = val === '單月' ? 'block' : 'none';
  document.getElementById('err-plan').style.display = 'none';
}

function selectShip(el, val) {
  document.querySelectorAll('.ship-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedShip = val;
  document.getElementById('ship-home').style.display = val === '宅配' ? 'block' : 'none';
  document.getElementById('ship-cvs').style.display = val === '超商取貨' ? 'block' : 'none';
}

async function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const area = document.getElementById('upload-area');
  const preview = document.getElementById('preview-img');
  const uploadingText = document.getElementById('uploading-text');

  // 顯示預覽
  const reader = new FileReader();
  reader.onload = e => {
    preview.src = e.target.result;
    preview.style.display = 'block';
    area.classList.add('has-file');
  };
  reader.readAsDataURL(file);

  // 上傳到 Imgur
  uploadingText.style.display = 'block';
  try {
    const formData = new FormData();
    formData.append('image', file);
    const r = await fetch('https://api.imgur.com/3/image', {
      method: 'POST',
      headers: { 'Authorization': 'Client-ID 546c25a59c58ad7' },
      body: formData,
    });
    const d = await r.json();
    if (d.success) {
      screenshotUrl = d.data.link;
      document.getElementById('err-file').style.display = 'none';
    } else {
      throw new Error('Upload failed');
    }
  } catch(e) {
    alert('截圖上傳失敗，請重試');
    screenshotUrl = '';
  } finally {
    uploadingText.style.display = 'none';
  }
}

async function submitForm() {
  let valid = true;

  if (!selectedLevel) { document.getElementById('err-level').style.display = 'block'; valid = false; }
  if (!selectedPlan)  { document.getElementById('err-plan').style.display = 'block'; valid = false; }
  if (!screenshotUrl) { document.getElementById('err-file').style.display = 'block'; valid = false; }

  const name = document.getElementById('f-name').value.trim();
  const yt   = document.getElementById('f-yt').value.trim();
  const join = document.getElementById('f-join').value;

  if (!name || !yt || !join) {
    alert('請填寫必填欄位（姓名、YouTube名稱、訂閱日期）');
    return;
  }
  if (selectedPlan === '單月' && !document.getElementById('f-reason').value.trim()) {
    alert('請填寫單月訂閱原因');
    return;
  }
  if (!valid) return;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '送出中…';

  try {
    const payload = {
      name,
      memberName:  yt,
      phone:       document.getElementById('f-phone').value,
      email:       document.getElementById('f-email').value,
      bday:        document.getElementById('f-bday').value,
      level:       selectedLevel,
      plan:        selectedPlan,
      reason:      document.getElementById('f-reason')?.value || '',
      joinDate:    join,
      shipType:    selectedShip,
      address:     document.getElementById('f-addr').value,
      convenience: document.getElementById('f-cvs').value,
      screenshot:  screenshotUrl,
    };

    const r = await fetch('/api/applications', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!r.ok) throw new Error('Failed');

    document.getElementById('form-wrap').style.display = 'none';
    document.getElementById('success-box').style.display = 'block';
  } catch(e) {
    alert('送出失敗，請稍後再試');
    btn.disabled = false;
    btn.textContent = '送出申請 ✦';
  }
}
</script>
</body>
</html>
